{% extends 'fruit_app/base.html' %}
{% load static %}
{% block content %}
  <h1>Fruit List</h1>

  <ul>
    {% for fruit in fruits %}
      <li>
        <img src="{% static 'fruit_app/img/' %}{{ fruit.name }}.jpg" />
        {{ fruit.name }} -
        {{ fruit.farbe }} -
        {{ fruit.gewicht }} g
      </li>
    {% endfor %}
  </ul>
{% endblock %}
